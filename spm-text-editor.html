<html lang="en">
<head>

  <meta name="keywords" content="
  Paper Mario: The Thousand-Year Door, Paper Mario TTYD, TTYD,

  TTYD text editor, TTYD text preview, TTYD hacking, TTYD modding, TTYD formatting, TTYD text render
  TTYD custom text, GameCube, GameCube modding, GameCube mods, GameCube hacking,
  Super Paper Mario, SPM, Super Paper Mario formatting, Super Paper Mario tags, 
  Super Paper Mario hacking, Super Paper Mario modding, Super Paper Mario text editor,

  <title>SPM/TTYD Text Renderer</title>
  <link rel="stylesheet" href="spm-stylesheet.css">
  <style>
    /* Font */
    @font-face { font-family: 'SPMText'; src: url('PopJoyStd-B.ttf') format('truetype'); }

    /* Base styles */
    body, #output { font-family: 'SPMText', sans-serif; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      background: #f4f4f4;
    }
    .controls {
      width: 80%;
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .controls button {
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
    }
    textarea {
      width: 80%;
      height: 20em;
      margin-bottom: 1rem;
      font-family: monospace;
      font-size: 1rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      resize: both;
    }
    #output {
      line-height: 1.4em;
      font-size: 1.5em;
      width: 27em;
      background: white;
      padding: 1em;
      white-space: pre-wrap;
      cursor: pointer;
      resize: both;
      overflow: auto;
      box-sizing: border-box;
      border: 0.2em solid black;
    }

    /* Animations */
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes dynamicShrink {
      from { transform: scale(var(--dyn-factor)); }
      to { transform: scale(1); }
    }
    @keyframes wave {
      from { transform: rotate(0deg) translateX(0.125em) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(0.125em) rotate(-360deg); }
    }
    @keyframes rainbow {
      0%{border-color:#FF5CB5;}
      25%{border-color:#FFEC63;}
      50%{border-color:#84FF42;}
      75%{border-color:#52D3FF;}
      100%{border-color:#FF5CB5;}
    }

    /* Letter effects */
    .shake-letter {
      display:inline-block;
      transform: translate(0, 0);
      will-change: transform;
    }
    .wave-letter {
      display:inline-block;
      animation: wave 0.9s linear infinite;
      transform-origin: center;
    }
    .dynamic-letter {
      display:inline-block;
      transform: scale(var(--dyn-factor));
      animation: dynamicShrink 0.05s forwards;
    }

    /* Page container styles */
    #output.fairy-border {
      border: 0.2em solid;
      animation: rainbow 5s linear infinite;
    }
    #output.kanban-border {
      border: 0.2em solid brown;
    }
    #output.system-style {
      background: darkblue;
      border:0.2em solid gray;
      color:white;
    }
    #output.diary-style {
      padding: 1em;
      background: lightgoldenrodyellow;
    }
    #output.clear-style {
      padding: 1em;
      background: black;
      color: white;
    }
    #output.majo-style {
      background: #4a3867;
      color: #ffddddff;
    }
  </style>
</head>
<body>
  <h1>SPM/TTYD Text Editor</h1>
  <div class="controls">
    <button id="importBtn" type="button">Import</button>
    <button id="exportBtn" type="button">Export</button>
    <!-- <label for="encodingSelect">Encoding:</label> -->
    <select id="encodingSelect" hidden>
      <option value="auto">Auto</option>
      <option value="utf-8">UTF-8</option>
      <option value="windows-1252">Windows-1252</option>
      <option value="iso-8859-1">ISO-8859-1</option>
      <option value="shift_jis">Shift_JIS</option>
      <option value="utf-16le">UTF-16 LE</option>
      <option value="utf-16be">UTF-16 BE</option>
    </select>
    <input id="fileInput" type="file" accept=".txt,text/plain" hidden>
  </div>
  <textarea id="input" placeholder="Easily edit Paper Mario: The Thousand-Year's and Super Paper Mario's text files using their custom formatting!
(Full documentation and separate SPM/TTYD modes coming... eventually)"></textarea>
  <div id="output" title="Click to advance"></div>
  <script>
    const inputArea=document.getElementById('input'), outputDiv=document.getElementById('output');
    const importBtn=document.getElementById('importBtn'), exportBtn=document.getElementById('exportBtn'), fileInput=document.getElementById('fileInput'), encodingSelect=document.getElementById('encodingSelect');
    let pages=[], fairyFlags=[], kanbanFlags=[], systemFlags=[], diaryFlags=[], clearFlags=[], majoFlags=[], currentPage=0;
    const ENCODING_STORAGE_KEY='spmImportEncoding';
    const SHAKE_INTERVAL_MS = 1;
    const SHAKE_RANGE_EM = 0.05;
    const SHAKE_LERP = 0.38;
    const shakeState = new WeakMap();

    function randomShakeValue() {
      return (Math.random() * 2 - 1) * SHAKE_RANGE_EM;
    }

    function ensureShakeState(node, now) {
      let state = shakeState.get(node);
      if (!state) {
        state = { x: 0, y: 0, tx: randomShakeValue(), ty: randomShakeValue(), lastTargetTime: now };
        shakeState.set(node, state);
      }
      return state;
    }

    function resetVisibleShakeLetters(now = performance.now()) {
      outputDiv.querySelectorAll('.shake-letter').forEach(node => {
        const state = { x: 0, y: 0, tx: randomShakeValue(), ty: randomShakeValue(), lastTargetTime: now };
        shakeState.set(node, state);
        node.style.transform = 'translate(0em, 0em)';
      });
    }

    function animateShake(now) {
      outputDiv.querySelectorAll('.shake-letter').forEach(node => {
        const state = ensureShakeState(node, now);

        if (now - state.lastTargetTime >= SHAKE_INTERVAL_MS) {
          const steps = Math.max(1, Math.floor((now - state.lastTargetTime) / SHAKE_INTERVAL_MS));
          state.lastTargetTime += steps * SHAKE_INTERVAL_MS;
          state.tx = randomShakeValue();
          state.ty = randomShakeValue();
        }

        state.x += (state.tx - state.x) * SHAKE_LERP;
        state.y += (state.ty - state.y) * SHAKE_LERP;
        node.style.transform = `translate(${state.x.toFixed(4)}em, ${state.y.toFixed(4)}em)`;
      });

      requestAnimationFrame(animateShake);
    }

    function createSpan(char, effects, scale, dyn, delay, waveDelay = delay) {
      let node=document.createTextNode(char);
      if(effects.includes('shake')){
        const s=document.createElement('span');
        s.className='shake-letter';
        s.appendChild(node);
        node=s;
      }
      if(effects.includes('wave')){
        const w=document.createElement('span');
        w.className='wave-letter';
        w.style.animationDelay=waveDelay+'ms';
        w.appendChild(node);
        node=w;
      }
      if(scale!==1){
        const sc=document.createElement('span');
        sc.style.display='inline-block';
        sc.style.fontSize=scale+'em';
        sc.appendChild(node);
        node=sc;
      }
      if(dyn!==1){
        const d=document.createElement('span');
        d.className='dynamic-letter';
        d.style.setProperty('--dyn-factor',dyn);
        d.style.animationDelay=delay+'ms';
        d.appendChild(node);
        node=d;
      }
      const f=document.createElement('span');
      f.style.display='inline-block';
      f.style.opacity='0';
      f.style.animation=`fadeIn 0s forwards ${delay}ms`;
      f.appendChild(node);
      return f;
    }

    function detectBomEncoding(bytes) {
      if (bytes.length >= 3 && bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) return { encoding: 'utf-8', bomLength: 3 };
      if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) return { encoding: 'utf-16le', bomLength: 2 };
      if (bytes.length >= 2 && bytes[0] === 0xFE && bytes[1] === 0xFF) return { encoding: 'utf-16be', bomLength: 2 };
      return null;
    }

    function decodeWithEncoding(bytes, encoding, fatal) {
      return new TextDecoder(encoding, { fatal }).decode(bytes);
    }

    function decodeTextFromBuffer(buffer, selectedEncoding) {
      const bytes = new Uint8Array(buffer);

      if (selectedEncoding && selectedEncoding !== 'auto') {
        return decodeWithEncoding(bytes, selectedEncoding, false).replace(/^\uFEFF/, '');
      }

      const bom = detectBomEncoding(bytes);
      if (bom) {
        const sliced = bytes.subarray(bom.bomLength);
        return decodeWithEncoding(sliced, bom.encoding, false).replace(/^\uFEFF/, '');
      }

      try {
        return decodeWithEncoding(bytes, 'utf-8', true);
      } catch (_) {}

      const fallbacks = ['windows-1252', 'shift_jis', 'iso-8859-1', 'utf-16le', 'utf-16be'];
      for (const enc of fallbacks) {
        try {
          return decodeWithEncoding(bytes, enc, true).replace(/^\uFEFF/, '');
        } catch (_) {}
      }

      return decodeWithEncoding(bytes, 'windows-1252', false).replace(/^\uFEFF/, '');
    }

  function createDefaultParserState() {
    return {
      stack: [],
      flags: { fairy:false, kanban:false, system:false, diary:false, clear:false, majo:false }
    };
  }

  function parseCustomTags(text, initialState = createDefaultParserState()) {
  const frag = document.createDocumentFragment();
  const stack = Array.isArray(initialState.stack)
    ? initialState.stack.map(entry => ({ ...entry }))
    : [];
  const initialFlags = initialState.flags || {};
  const flags = {
    fairy: !!initialFlags.fairy,
    kanban: !!initialFlags.kanban,
    system: !!initialFlags.system,
    diary: !!initialFlags.diary,
    clear: !!initialFlags.clear,
    majo: !!initialFlags.majo,
    ph:false
  };
  let d = 0, i = 0;
  let waveLineIndex = 0;

  // A stack of “containers” where new nodes should be appended.
  // Start with the root fragment.
  const containerStack = [{ type: 'root', node: frag }];

  function currentContainer() {
    return containerStack[containerStack.length - 1].node;
  }

  while (i < text.length) {
    let c = text[i];
    if (c === 'Þ') c = '☆';
    if (c === '®') c = '←';
    if (c === '©') c = '→';
    if (c === 'Ø') c = '♪';
    if (c === '³') c = '↓';
    if (c === '²') c = '↑';

    // 1) Newline → <br>
    if (c === '\n') {
      currentContainer().appendChild(document.createElement('br'));
      waveLineIndex = 0;
      i++;
      continue;
    }


// ICON handler (inside parseCustomTags, at top of the while loop)
const iconMatch = text.slice(i).match(/^<\s*icon\s+([^\s>]+)[^>]*>/i);
if (iconMatch) {
  const arg   = iconMatch[1].toUpperCase();
  if (arg === 'CRYSTAL') {
    const img = document.createElement('img');
    img.src    = 'images/Merlumina.png';
    img.alt    = 'Merlumina';
    img.style.width  = '3em';
    img.style.height = '3em';
    currentContainer().appendChild(img);
  } else if (arg === 'AC_STAR') {
  const img = document.createElement('img');
    img.src    = 'images/Star.png';
    img.alt    = 'Shooting Star';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
  } else if (arg === 'AC_KOURA') {
  const img = document.createElement('img');
    img.src    = 'images/Shell.png';
    img.alt    = 'Shell';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
  } else if (arg === 'AC_ON') {
  const img = document.createElement('img');
    img.src    = 'images/Circle.png';
    img.alt    = 'Circle with star';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
  } else if (arg === 'AC_KINOKO') {
  const img = document.createElement('img');
    img.src    = 'images/Mushroom.png';
    img.alt    = 'Mushroom';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
	} else if (arg === 'PAD_PLUS') {
  const img = document.createElement('img');
    img.src    = 'images/Plus.png';
    img.alt    = 'Plus button';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
	} else if (arg === 'PAD_MINUS') {
  const img = document.createElement('img');
    img.src    = 'images/Minus.png';
    img.alt    = 'Minus button';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
	} else if (arg === 'STICK') {
  const img = document.createElement('img');
    img.src    = 'images/Dpad.png';
    img.alt    = 'D-Pad';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
	} else if (arg === 'PAD') {
  const img = document.createElement('img');
    img.src    = 'images/Wiimote.png';
    img.alt    = 'Wii remote';
    img.style.width  = '4em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
  } else if (arg === 'PAD_1') {
  const img = document.createElement('img');
    img.src    = 'images/1.png';
    img.alt    = '1 button';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
  } else if (arg === 'PAD_2') {
  const img = document.createElement('img');
    img.src    = 'images/2.png';
    img.alt    = '2 button';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
  } else if (arg === 'PAD_A') {
  const img = document.createElement('img');
    img.src    = 'images/A.png';
    img.alt    = 'A button';
    img.style.width  = '1em';
    img.style.height = '1em';
    currentContainer().appendChild(img);
  } else {
    let displayText;
    if (arg.startsWith('STICK'))
      displayText = '✚';
    else if (arg === 'AC_STAR')
      displayText = '★';
    else if (arg === 'PAD_PLUS')
      displayText = '⊕';
    else if (arg === 'PAD_MINUS')
      displayText = '⊖';
    else if (arg === 'PAD_1')
      displayText = '❶';
    else if (arg === 'PAD_2')
      displayText = '❷';
    else if (arg.startsWith('PAD_A'))
      displayText = '🅐';
    else if (arg.startsWith('PAD_B'))
      displayText = '🅱';
    else if (arg.startsWith('PAD_Y'))
      displayText = '🆈';
    else if (arg.startsWith('PAD_X'))
      displayText = '🆇';
    else if (arg.startsWith('AC_KOURA'))
      displayText = 'Shell';
    else if (arg.startsWith('AC_ON'))
      displayText = 'Circle';
    else if (arg === 'HM')
      displayText = '♡';
    else if (arg.startsWith('AC_KINOKO'))
      displayText = 'Mushroom';
	  else {
      displayText = arg.charAt(0);
    }

    for (const ch of displayText) {
      const waveDelay = waveLineIndex * 25;
      currentContainer().appendChild(
        createSpan(
          ch,
          stack.filter(e => ['shake','wave'].includes(e.type)).map(e => e.type),
          stack.filter(e => e.type === 'scale').reduce((s,e) => s * e.factor, 1),
          stack.filter(e => e.type === 'dynamic').reduce((s,e) => s * e.factor, 1),
          d * 25,
          waveDelay
        )
      );
      d++;
      waveLineIndex++;
    }
  }

  // advance past the <icon…> tag and resume parsing
  i += iconMatch[0].length;
  continue;
}


    // 3) Open‐tag
    const openMatch = text.slice(i).match(
      /^<\s*(shake|wave|scale|dynamic|wait|fairy|kanban|system|diary|clear|majo|col|wpos|dkey|AN|ITEM|housou|plate|tec|boss|keyxon|anim|s|num|se)\s*([^>]*)>/i
    );
    if (openMatch) {
      const t = openMatch[1].toLowerCase();
      const arg = openMatch[2].trim();

      switch (t) {
        case 'wait':
          d += Math.ceil(parseFloat(arg) / 25) || 0;
          break;
        case 'col':
          stack.push({ type:'col', value:arg });
          break;
        case 'scale': {
          const existing = stack.find(e => e.type === 'scale');
          const nf       = parseFloat(arg) || 1;
          if (existing) existing.factor = nf;
          else stack.push({ type:'scale', factor:nf });
          break;
        }
        case 'dynamic':
          if (!stack.some(e => e.type === 'dynamic'))
            stack.push({ type:'dynamic', factor:parseFloat(arg)||1 });
          break;
        case 'shake':
          if (!stack.some(e => e.type === 'shake'))
            stack.push({ type:'shake' });
          break;
        case 'wave':
          if (!stack.some(e => e.type === 'wave'))
            stack.push({ type:'wave' });
          break;
        case 'fairy':
          flags.fairy = true;
          break;
        case 'kanban':
          flags.kanban = true;
          break;
        case 'system':
          flags.system = true;
          break;
        case 'diary':
          flags.diary = true;
          break;
        case 'clear':
          flags.clear = true;
          break;
        case 'majo':
          flags.majo = true;
          break;
      }

      i += openMatch[0].length;
      continue;
    }

    // 4) Close‐tag
    const closeMatch = text.slice(i).match(
      /^<\s*\/\s*(shake|wave|scale|dynamic|wait|fairy|kanban|system|col|wpos|dkey|keyxon|anim|se)\s*>/i
    );
    if (closeMatch) {
      const t = closeMatch[1].toLowerCase();
      {
        if (t === 'fairy')  flags.fairy = false;
        if (t === 'kanban') flags.kanban = false;
        if (t === 'system') flags.system = false;
        if (t === 'diary')  flags.diary = false;
        if (t === 'clear')  flags.clear = false;
        if (t === 'majo')   flags.majo = false;

        for (let j = stack.length - 1; j >= 0; j--) {
          if (stack[j].type === t) {
            stack.splice(j, 1);
            break;
          }
        }
      }

      i += closeMatch[0].length;
      continue;
    }

    // 5) Strip any other junk tags
    const junkTag = text.slice(i).match(/^<[^>]+>/);
    if (junkTag) {
      i += junkTag[0].length;
      continue;
    }

    // 6) Regular character
    const effects = stack.filter(e => ['shake','wave'].includes(e.type)).map(e => e.type);
    const scaleVal = stack.filter(e => e.type === 'scale').reduce((s,e) => s * e.factor, 1);
    const dynVal   = stack.filter(e => e.type === 'dynamic').reduce((s,e) => s * e.factor, 1);
    const colorEntry = stack.find(e => e.type === 'col');
    const color = colorEntry ? '#' + colorEntry.value : null;
    const delay = d * 25;
    const waveDelay = waveLineIndex * 25;

    let node = createSpan(c, effects, scaleVal, dynVal, delay, waveDelay);
    if (color) {
      const sp = document.createElement('span');
      sp.style.color = color;
      sp.appendChild(node);
      node = sp;
    }
    currentContainer().appendChild(node);
    d++;
    waveLineIndex++;
    i++;
  }

  return {
    fragment: frag,
    ...flags,
    endState: {
      stack: stack.map(entry => ({ ...entry })),
      flags: {
        fairy: flags.fairy,
        kanban: flags.kanban,
        system: flags.system,
        diary: flags.diary,
        clear: flags.clear,
        majo: flags.majo
      }
    }
  };
}


  function generatePages(text) {
{
  // Convert null bytes to real line breaks before any formatting/page logic.
  text = text.replace(/\u0000/g, '\n');

  // Remove pure tag lines from visual output while preserving their effects.
  // Tag-only lines are merged into neighboring content so they do not render blank rows.
  const rawLines = text.split("\n");
  const compactLines = [];
  let pendingTagOnly = "";

  rawLines.forEach(rawLine => {
    const lineForCheck = rawLine.replace(/\u0000/g, "");
    if (/^(?:\s*<[^>]+>\s*)+$/.test(lineForCheck)) {
      pendingTagOnly += rawLine.trim();
      return;
    }

    if (pendingTagOnly) {
      compactLines.push(pendingTagOnly + rawLine);
      pendingTagOnly = "";
    } else {
      compactLines.push(rawLine);
    }
  });

  if (pendingTagOnly) {
    if (compactLines.length > 0) compactLines[compactLines.length - 1] += pendingTagOnly;
    else compactLines.push(pendingTagOnly);
  }

  text = compactLines.join("\n");


// Insert newline before other text whenever an underscore‐word is followed by non‐space
text = text
  .split('\n')
  .map(line => {
    // Apply only if there’s at least one underscore‐word
    if (/\b\w+_\w+\b/.test(line)) {
      // Remove tags to check plain text
      const stripped = line.replace(/<[^>]+>/g, '');
      // Insert “\n” after the spaces that follow every underscore‐word
      return line.replace(
        /(\b\w+_\w+\b)(\s+)(?=\S)/g,
        '$1$2\n'
      );
    }
    return line;
  })
  .join('\n');


const underscoreWordRegex = /\b(?!PAD_|AC_|se_|adv_|ICON_|AN_)\w+_\w*\b/;
const pageBreakToken = "[[SPM_PAGE_BREAK]]";
 
function isUnderscoreAdjacentThroughTagsAndWhitespace(fullText, tagStart, tagEnd) {
  const left = fullText.slice(0, tagStart).replace(/(?:[\s\u0000]|<[^>]+>)*$/g, "");
  const right = fullText.slice(tagEnd).replace(/^(?:[\s\u0000]|<[^>]+>)*/g, "");
  const leftAdjacentUnderscore = /\b(?!PAD_|AC_|se_|adv_|ICON_|AN_)\w+_\w*$/.test(left);
  const rightAdjacentUnderscore = /^(?!PAD_|AC_|se_|adv_|ICON_|AN_)\w+_\w*\b/.test(right);
  return leftAdjacentUnderscore || rightAdjacentUnderscore;
}

// Treat <p> as page breaks unless they are on an underscore line or only separated
// from an underscore-word by tags/newlines/whitespace.
text = text.replace(/<p>/gi, (tag, offset, fullText) => {
  const lineStart = fullText.lastIndexOf("\n", offset) + 1;
  const nextNewline = fullText.indexOf("\n", offset);
  const lineEnd = nextNewline === -1 ? fullText.length : nextNewline;
  const line = fullText.slice(lineStart, lineEnd);
  const visibleText = line.replace(/<[^>]+>/g, "");

  if (underscoreWordRegex.test(visibleText)) return tag;
  if (isUnderscoreAdjacentThroughTagsAndWhitespace(fullText, offset, offset + tag.length)) return tag;
  return pageBreakToken;
});

// Split on explicit <p>-based breaks and on real underscore-words.
// <p> keeps text effect state; underscore-word splits reset state.
const segments = [];
text.split(pageBreakToken).forEach((chunk, chunkIdx) => {
  chunk.split(/(?=(?!PAD_|AC_|se_|adv_|ICON_|AN_)\b\w+_\w*\b)/).forEach((part, partIdx) => {
    // If an underscore split happens right after a tag-only line, collapse
    // that line break so tags do not render as an empty line.
    const normalizedPart = part.replace(/[\r\n]+([\s\u0000]*(?:<[^>]+>[\s\u0000]*)+)$/g, (_, tags) => tags);
    if (normalizedPart.replace(/[\s\u0000]+/g, "").length > 0) {
      const splitType = partIdx > 0 ? 'underscore' : (chunkIdx > 0 ? 'p' : 'start');
      segments.push({ raw: normalizedPart, splitType });
    }
  });
});


  // Reset pages & flags
  pages = [];
  fairyFlags = [];
  kanbanFlags = [];
  systemFlags = [];
  diaryFlags = [];
  clearFlags = [];
  majoFlags = [];


// Process each segment, collapsing <ph> lines to zero height
let parserState = createDefaultParserState();
segments.forEach(({ raw, splitType }) => {
  if (splitType === 'underscore' || splitType === 'start') {
    parserState = createDefaultParserState();
  }

  const trimmed = raw.trim();
  const { fragment, fairy, kanban, system, diary, clear, majo, ph, endState } = parseCustomTags(trimmed, parserState);
  parserState = endState;

  if (ph) {
    // Wrap the placeholder-only content so it takes zero height
    const wrapper = document.createElement('div');
    wrapper.style.height = '0';
    wrapper.style.overflow = 'hidden';
    wrapper.appendChild(fragment);
    pages.push(wrapper);
  } else {
    // Normal line: keep the parsed fragment as-is
    pages.push(fragment);
  }

  // Push flags (keep flags.ph if needed later, though it's only for collapsing)
  fairyFlags.push(fairy);
  kanbanFlags.push(kanban);
  systemFlags.push(system);
  diaryFlags.push(diary);
  clearFlags.push(clear);
  majoFlags.push(majo);
});

// Start at the first page
currentPage = 0;
}}

    function showPage(idx){
      if(!pages[idx])return;
      outputDiv.innerHTML='';
      outputDiv.className='';
      if(fairyFlags[idx])outputDiv.classList.add('fairy-border');
      if(kanbanFlags[idx])outputDiv.classList.add('kanban-border');
      if(systemFlags[idx])outputDiv.classList.add('system-style');
      if(diaryFlags[idx])outputDiv.classList.add('diary-style');
      if(clearFlags[idx])outputDiv.classList.add('clear-style');
      if(majoFlags[idx])outputDiv.classList.add('majo-style');
      outputDiv.appendChild(pages[idx].cloneNode(true));
      resetVisibleShakeLetters();
    }
    function updatePreview(){
      generatePages(inputArea.value);
      showPage(0);
    }
    inputArea.addEventListener('input',updatePreview);
    outputDiv.addEventListener('click',()=>{if(currentPage<pages.length-1)showPage(++currentPage);});
    updatePreview();
    requestAnimationFrame(animateShake);
    const savedEncoding=localStorage.getItem(ENCODING_STORAGE_KEY);
    if(savedEncoding&&encodingSelect.querySelector(`option[value="${savedEncoding}"]`))encodingSelect.value=savedEncoding;
    encodingSelect.addEventListener('change',()=>localStorage.setItem(ENCODING_STORAGE_KEY,encodingSelect.value));
    importBtn.addEventListener('click',()=>fileInput.click());
    fileInput.addEventListener('change',event=>{
      const file=event.target.files&&event.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          inputArea.value=decodeTextFromBuffer(reader.result,encodingSelect.value);
          updatePreview();
        }catch(err){
          alert('Failed to decode file with the selected encoding.');
          console.error(err);
        }
      };
      reader.readAsArrayBuffer(file);
      fileInput.value='';
    });
    exportBtn.addEventListener('click',()=>{
      const blob=new Blob([inputArea.value],{type:'text/plain;charset=utf-8'});
      const link=document.createElement('a');
      link.href=URL.createObjectURL(blob);
      link.download='spm-text.txt';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
    });
  </script>
</body>
</html>
